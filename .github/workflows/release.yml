name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip uploading to release'
        type: boolean
        default: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: app
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install nhyris
        run: npm install -g github:skmonckton/nhyris
      - name: Debug working directory
        working-directory: app
        run: |
          pwd
          ls
      - name: Re-install standalone R
        working-directory: app
        run: npm run install-R
      - name: Debug R installation
        if: always() && runner.os != 'Windows'
        working-directory: app
        run: |
          echo "--- r-nhyris top level ---"
          ls r-nhyris/ 2>/dev/null || echo "r-nhyris missing entirely"
          echo "--- etc ---"
          ls r-nhyris/etc/ 2>/dev/null || echo "etc missing"
          echo "--- library ---"
          ls r-nhyris/library/ 2>/dev/null || echo "library missing"
          echo "--- bin/R first 30 lines ---"
          head -30 r-nhyris/bin/R 2>/dev/null || echo "bin/R missing"
          echo "--- Test Rscript ---"
          R_HOME_DIR="$(pwd)/r-nhyris" RHOME="$(pwd)/r-nhyris" r-nhyris/bin/Rscript -e "cat('Rscript works\n')" 2>&1 || echo "Rscript failed"
      - name: Install dependencies
        run: nhyris update app
      - name: Build app
        run: nhyris build app
      - name: Upload artifacts to GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/make/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
