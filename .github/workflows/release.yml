name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            name: windows
          - os: macos-latest
            platform: darwin
            arch: x64
            name: macos
          - os: ubuntu-latest
            platform: linux
            arch: x64
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check if platform is selected for build
        id: check
        shell: bash
        run: echo "run=${{ github.event_name == 'push' || (matrix.name == 'windows' && inputs.build_windows) || (matrix.name == 'macos' && inputs.build_macos) || (matrix.name == 'linux' && inputs.build_linux) }}" >> $GITHUB_OUTPUT
      - name: Checkout repo
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v5
        with:
          path: app
      - name: Set up Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install nhyris fork
        if: steps.check.outputs.run == 'true'
        run: npm install -g github:skmonckton/nhyris
      - name: Install R system dependencies (Linux)
        if: steps.check.outputs.run == 'true' && runner.os == 'Linux'
        run: sudo apt-get install -y libblas3 liblapack3 libgfortran5 libgomp1
      - name: Install base R & Node packages
        if: steps.check.outputs.run == 'true'
        working-directory: app
        run: npm run install-R
      - name: Install/update dependencies
        if: steps.check.outputs.run == 'true'
        run: nhyris update app
      - name: Build app
        if: steps.check.outputs.run == 'true'
        run: nhyris build app
      - name: Upload artifacts to GitHub Release (on tag push)
        if: ${{ startsWith(github.ref, 'refs/tags/') && steps.check.outputs.run == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.os == 'windows-latest' && 'app/out/make/*.exe' || '' }}
            ${{ matrix.os == 'windows-latest' && 'app/out/make/*.nupkg' || '' }}
            ${{ matrix.os == 'windows-latest' && 'app/out/make/RELEASES' || '' }}
            ${{ matrix.os != 'windows-latest' && 'app/out/make/**/*' || '' }}
          generate_release_notes: true
          body: |
            <img height="60" alt="BOLDreflectR" src="https://github.com/skmonckton/BOLDreflectR/raw/main/shiny/www/reflectR-name.png" />

            **BOLDreflectR** is a graphical user interface for [BOLDconnectR](https://doi.org/10.32614/CRAN.package.BOLDconnectR) allowing basic exploration and analysis of data from BOLD.

            ### Installation
            **Windows**: Download and install from the provided `.exe` file.
            **macOS**: Download and open the provided `.dmg` file, then drag and drop to your applications folder.
            **Linux**: Download the provided `.AppImage` file to the desired directory. To run, make the file executable via the file manager (Right-click -> Properties -> Permissions -> Allow executing file as program) or by running `chmod +x BOLDreflectR-x.x.x-x64.AppImage` in the terminal.

            ### Run in RStudio
            BOLDreflectR can also be run directly from the R Shiny code available in the repository's `shiny` sub-directory: [BOLDreflectR/tree/main/shiny](https://github.com/skmonckton/BOLDreflectR/tree/main/shiny).

            ### Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts for inspection (on manual trigger)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.check.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifacts
          path: |
            ${{ matrix.os == 'windows-latest' && 'app/out/make/*.exe' || '' }}
            ${{ matrix.os == 'windows-latest' && 'app/out/make/*.nupkg' || '' }}
            ${{ matrix.os == 'windows-latest' && 'app/out/make/RELEASES' || '' }}
            ${{ matrix.os != 'windows-latest' && 'app/out/make/**/*' || '' }}
          retention-days: 3