name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip uploading to release'
        type: boolean
        default: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: MYAPP  # checkout into a subdirectory instead of the root

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install npm dependencies
        working-directory: BOLDreflectR
        run: npm ci

      - name: Install nhyris
        run: npm install -g github:yourusername/nhyris

      - name: Install electron & R dependencies
        run: |
          cd ${{ github.workspace }}
          nhyris update BOLDreflectR

      - name: Build app
        run: |
          cd ${{ github.workspace }}
          nhyris build BOLDreflectR

      - name: Upload artifacts to GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
