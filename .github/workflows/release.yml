name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install nhyris
        run: npm install -g github:skmonckton/nhyris

      - name: Clone app
        run: git clone https://github.com/skmonckton/BOLDreflectR app

      - name: Install R system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libblas3 liblapack3 libgfortran5 libgomp1

      - name: Install/update app dependencies
        run: nhyris update app

      - name: Build app
        run: nhyris build app

      - name: Diagnostics
        shell: bash
        run: |
          echo "--- electron-forge binary ---"
          ls app/node_modules/.bin/electron-forge 2>/dev/null || echo "electron-forge binary missing"
          echo "--- npx resolution ---"
          cd app && npx electron-forge --version 2>&1 || echo "npx electron-forge failed"
          echo "--- node_modules/@electron-forge ---"
          ls app/node_modules/@electron-forge/ 2>/dev/null || echo "@electron-forge missing"

      - name: Check output
        if: always()
        shell: bash
        run: |
          echo "--- out directory ---"
          ls app/out/ 2>/dev/null || echo "out/ missing entirely"
          echo "--- make directory ---"
          ls app/out/make/ 2>/dev/null || echo "make/ missing"
          echo "--- full tree ---"
          find app/out/ 2>/dev/null || echo "nothing found"

      - name: Upload to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/make/**/*
          generate_release_notes: true
          body: |
            <img height="60" alt="BOLDreflectR" src="https://github.com/skmonckton/BOLDreflectR/raw/main/shiny/www/reflectR-name.png" />

            **BOLDreflectR** is a graphical user interface for [BOLDconnectR](https://doi.org/10.32614/CRAN.package.BOLDconnectR) allowing basic exploration and analysis of data from BOLD.

            ### Installation
            **Windows**: Download and install from the provided `.exe` file.

            **macOS**: Download and open the provided `.dmg` file, then drag and drop to your applications folder. To run the app you may need to override Apple's security settings, either by following [Apple's suggested method](https://support.apple.com/en-gb/guide/mac-help/mh40616/mac) or by running the following code in the terminal: `xattr -d com.apple.quarantine /Applications/BOLDreflectR.app`.

            **Linux**: Download the provided `.AppImage` file to the desired directory. To run, make the file executable via the file manager (Right-click -> Properties -> Permissions -> Allow executing file as program) or by running `chmod +x BOLDreflectR-x.x.x-x64.AppImage` in the terminal.

            ### Run in RStudio
            BOLDreflectR can also be run directly from the R Shiny code available in the repository's `shiny` sub-directory: [BOLDreflectR/tree/main/shiny](https://github.com/skmonckton/BOLDreflectR/tree/main/shiny).

            ### Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts for inspection (on manual trigger)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.name }}-artifacts
          path: app/out/make/**/*
          retention-days: 3