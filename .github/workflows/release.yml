name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip uploading to release'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            name: windows
          - os: macos-latest
            platform: darwin
            arch: x64
            name: macos
          - os: ubuntu-latest
            platform: linux
            arch: x64
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check if platform is selected for build
        id: check
        shell: bash
        run: echo "run=${{ github.event_name == 'push' || (matrix.name == 'windows' && inputs.build_windows) || (matrix.name == 'macos' && inputs.build_macos) || (matrix.name == 'linux' && inputs.build_linux) }}" >> $GITHUB_OUTPUT
      - name: Checkout repo
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v5
        with:
          path: app
      - name: Set up Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install nhyris
        if: steps.check.outputs.run == 'true'
        run: npm install -g github:skmonckton/nhyris
      - name: Install R system dependencies (Linux)
        if: steps.check.outputs.run == 'true' && runner.os == 'Linux'
        run: sudo apt-get install -y libblas3 liblapack3 libgfortran5 libgomp1
      - name: Re-install standalone R
        if: steps.check.outputs.run == 'true'
        working-directory: app
        run: npm run install-R
      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: nhyris update app
      - name: Build app
        if: steps.check.outputs.run == 'true'
        run: nhyris build app
      - name: List artifacts (macOS / Linux)
        if: runner.os != 'Windows' && steps.check.outputs.run == 'true'
        run: find app/out/make -type f 2>/dev/null || echo "No artifacts found"
      - name: List artifacts (Windows)
        if: runner.os == 'Windows' && steps.check.outputs.run == 'true'
        run: Get-ChildItem -Recurse app/out/make -ErrorAction SilentlyContinue || Write-Host "No artifacts found"
        shell: pwsh
      - name: Upload artifacts to GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') && steps.check.outputs.run == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/make/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
