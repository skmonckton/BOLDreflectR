name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip uploading to release'
        type: boolean
        default: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: app
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install nhyris
        run: npm install -g github:skmonckton/nhyris
      - name: Debug working directory
        working-directory: app
        run: |
          pwd
          ls
      - name: Re-install standalone R
        working-directory: app
        run: npm run install-R
      - name: Debug r-nhyris contents
        if: failure()
        working-directory: app
        run: |
          echo "--- r-nhyris top level ---"
          ls r-nhyris/
          echo "--- tarball structure (re-download) ---"
          curl -L -o /tmp/r-test.tar.gz "https://cdn.posit.co/r/ubuntu-2404/R-4.5.0-ubuntu-2404.tar.gz"
          tar -tzf /tmp/r-test.tar.gz | head -40
      - name: Install dependencies
        run: nhyris update app
      - name: Build app
        run: nhyris build app
      - name: Upload artifacts to GitHub Release
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/out/make/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
